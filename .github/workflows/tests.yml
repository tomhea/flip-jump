# Note: add all job names to the deploy-status.needs.

name: Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

# least-privilege GITHUB_TOKEN: these jobs only check out and run tests/linters,
# so read-only access to the repo contents is all they need.
permissions:
  contents: read

env:
  COLUMNS: 120

jobs:
  test_py_os_variations:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tox tox-gh-actions
    - name: Test with tox py${{ matrix.python-version }}-${{ matrix.os }}
      run: tox -v

  linters_checkers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: 3.14
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[tests]
      - name: Mypy, Flake, Bandit, Black
        run: tox -e mypy,flake8,bandit,black

  test_full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: 3.14
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[tests]
      - name: Test pytest
        run: |
          pytest --compile -n auto --all --ignore=tests/unit  --junitxml=./compile-test-results.xml
          pytest --run -n auto --all --ignore=tests/unit  --junitxml=./run-test-results.xml
      - name: Show tests results
        if: always()
        uses: pmeier/pytest-results-action@main
        with:
          path: ./*-test-results.xml

  # The assembler/interpreter unit-tests (tests/unit). They are pure-python and fast,
  # so they run as their own job in parallel with the .fj compile/run tests. The
  # --unit-tests flag marks the run as unrelated to the .fj compile/run tests, which
  # lets it be parallelized with -n auto.
  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.14
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[tests]
      - name: Test pytest
        run: pytest tests/unit --unit-tests -n auto  --junitxml=./unit-test-results.xml
      - name: Show tests results
        if: always()
        uses: pmeier/pytest-results-action@main
        with:
          path: ./unit-test-results.xml

  # This allows us to have a branch protection rule this entire workflow
  deploy-status:
    runs-on: ubuntu-latest
    needs: [ test_py_os_variations, linters_checkers, test_full, unit_tests ]
    if: always()
    steps:
      - name: Successful deploy
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Failing deploy
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
