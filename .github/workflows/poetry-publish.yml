# This workflow will upload the new flipjump python package to pypi, using poetry-publish, everytime a new release is created.


name: Python package
on:
  release:
    types: [published]

# the publish uses the PYPI_API_TOKEN secret (not GITHUB_TOKEN), so the job only
# needs read access to check out the repo.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build and publish to pypi
        uses: JRubics/poetry-publish@v1.17
        with:
          pypi_token: ${{ secrets.PYPI_API_TOKEN }}
