[tox]
min_version = 4.0
env_list = py310, py311, py312, py313, py314,
           mypy, flake8, bandit, black,
           full_tests
isolated_build = true

[gh-actions]
;Notice that in gh-actions we don't run the full_tests via tox.
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
setenv = PYTHONPATH = {toxinidir}
deps = .[tests]
; the unit-tests run in their own CI job (and via `pytest tests/unit`), so they're
; excluded here to keep this per-python-version matrix to the .fj tests only.
commands = pytest --regular --ignore=tests/unit

[testenv:mypy]
basepython = python3.14
commands = mypy

[testenv:bandit]
basepython = python3.14
commands = bandit -r -s B101 flipjump tests

[testenv:flake8]
basepython = python3.14
commands = flake8

[testenv:black]
basepython = python3.14
commands = black . --check --color --diff

[testenv:full_tests]
basepython = python3.14
commands =
    pytest --compile -n auto --all --ignore=tests/unit
    pytest --run -n auto --all --ignore=tests/unit
    pytest tests/unit --unit-tests -n auto


[flake8]
exclude =
    .git,
    __pycache__,
    .tox,
    tests/inout
    tests/compiled
    venv

max-line-length=120

per-file-ignores =
    # imported but unused
    flipjump/__init__.py: F401
    # redefinition of unused / undefined name
    flipjump/assembler/fj_parser.py: F811, F821


[bandit]
recursive = true
targets = flipjump,tests
skips = B101
